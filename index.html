const idxECC = {}, idxS4 = {};
DATA.forEach(d => {
  if (!idxECC[d.ecc]) idxECC[d.ecc] = [];
  idxECC[d.ecc].push(d);
  if (!idxS4[d.s4]) idxS4[d.s4] = [];
  idxS4[d.s4].push(d);
});
let mode = 'ecc';
function setMode(m) {
  mode = m;
  document.getElementById('btn-ecc').classList.toggle('active', m==='ecc');
  document.getElementById('btn-s4').classList.toggle('active', m==='s4');
  document.getElementById('btn-desc').classList.toggle('active', m==='desc');
  const input = document.getElementById('searchInput');
  if (m==='ecc') { input.placeholder='Masukkan MID ECC (lama), mis: 14013849'; }
  else if (m==='s4') { input.placeholder='Masukkan MID S4 (baru), mis: 15006235'; }
  else { input.placeholder='Cari deskripsi, mis: SOKLIN, NUVO...'; }
  input.value='';
  document.getElementById('results').innerHTML='';
}
function liveSearch() {
  const v = document.getElementById('searchInput').value.trim();
  if (v.length >= 3) doSearch();
  else if (v.length === 0) document.getElementById('results').innerHTML='';
}
function doSearch() {
  const q = document.getElementById('searchInput').value.trim().toLowerCase();
  if (!q) return;
  let matches = [];
  if (mode==='ecc') { Object.keys(idxECC).forEach(k => { if(k.includes(q)) matches.push(...idxECC[k]); }); }
  else if (mode==='s4') { Object.keys(idxS4).forEach(k => { if(k.includes(q)) matches.push(...idxS4[k]); }); }
  else { matches = DATA.filter(d => d.desc_s4.toLowerCase().includes(q) || d.desc_ecc.toLowerCase().includes(q)); }
  const seen = new Set();
  matches = matches.filter(d => { const key=d.ecc+'_'+d.s4; if(seen.has(key)) return false; seen.add(key); return true; });
  renderResults(matches, q);
}
function renderResults(matches, q) {
  const el = document.getElementById('results');
  if (!matches.length) {
    el.innerHTML = '<div class="result-card"><div class="no-result">❌ MID tidak ditemukan untuk "<b>'+q+'</b>"</div></div>';
    return;
  }
  const header = '<div class="result-header">Ditemukan <span class="count-badge">'+matches.length+'</span> hasil · Klik MID untuk menyalin</div>';
  const items = matches.slice(0,100).map(d =>
    '<div class="result-item">'+
    '<div class="mid-row">'+
    '<div><div class="mid-label">MID LAMA (ECC)</div><div class="mid-box mid-ecc" onclick="copyMID(\''+d.ecc+'\')">📋 '+d.ecc+'</div></div>'+
    '<span class="mid-arrow">→</span>'+
    '<div><div class="mid-label">MID BARU (S4)</div><div class="mid-box mid-s4" onclick="copyMID(\''+d.s4+'\')">📋 '+d.s4+'</div></div>'+
    '<span class="badge">'+d.uom+'</span></div>'+
    '<div class="desc-row">'+
    '<div class="desc-item"><span class="desc-label">Deskripsi S4</span><span>'+d.desc_s4+'</span></div>'+
    '<div class="desc-item"><span class="desc-label">Deskripsi ECC</span><span>'+d.desc_ecc+'</span></div>'+
    '<div class="desc-item"><span class="desc-label">Material</span><span>'+d.material+'</span></div>'+
    '</div></div>'
  ).join('');
  el.innerHTML = '<div class="result-card">'+header+items+'</div>';
}
function copyMID(mid) {
  navigator.clipboard.writeText(mid).then(() => {
    const t = document.getElementById('toast');
    t.textContent = '✅ MID '+mid+' disalin!';
    t.classList.add('show');
    setTimeout(() => t.classList.remove('show'), 2000);
  });
}
